name: Ring — canary

# Canary is the entry point of the release train. Every push to main that
# touches shipping code publishes one immutable prerelease to the `canary`
# npm dist-tag. Nothing here can move `latest`, and nothing here touches PyPI
# or the macOS lane — prerelease rings are npm-only by policy, because PyPI
# versions can never be deleted or reused.

on:
  push:
    branches: [main]
    paths:
      - 'typescript/**'
      - 'scripts/**'
      - '.github/workflows/ring-canary.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: openrappter-ring-canary
  cancel-in-progress: false

jobs:
  gate:
    name: Verify before publishing
    uses: ./.github/workflows/ci.yml

  canary:
    name: Publish canary
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: typescript/package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Unit-test the ring logic
        run: node --test scripts/ring.test.mjs

      - name: Resolve canary version and dist-tag
        id: ring
        shell: bash
        run: |
          set -euo pipefail
          version="$(node scripts/ring-cli.mjs version --ring canary --sha "$GITHUB_SHA")"
          tag="$(node scripts/ring-cli.mjs dist-tag --ring canary)"

          # Fail closed: a prerelease ring must never own `latest`.
          if [ "$tag" = "latest" ]; then
            echo "refusing to publish canary to the latest dist-tag" >&2
            exit 1
          fi

          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          printf 'Canary %s -> dist-tag %s\n' "$version" "$tag"

      - name: Skip if this version is already published
        id: state
        shell: bash
        env:
          VERSION: ${{ steps.ring.outputs.version }}
        run: |
          set -euo pipefail
          if npm view "openrappter@${VERSION}" version >/dev/null 2>&1; then
            printf 'published=true\n' >> "$GITHUB_OUTPUT"
            printf '%s already on the registry; nothing to do\n' "$VERSION"
          else
            printf 'published=false\n' >> "$GITHUB_OUTPUT"
          fi

      - name: Stamp the canary version
        if: steps.state.outputs.published == 'false'
        working-directory: typescript
        env:
          VERSION: ${{ steps.ring.outputs.version }}
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build
        if: steps.state.outputs.published == 'false'
        working-directory: typescript
        run: |
          npm ci
          npm run build

      - name: Publish to the canary dist-tag
        if: steps.state.outputs.published == 'false'
        working-directory: typescript
        env:
          NPM_PUBLISH_TAG: ${{ steps.ring.outputs.tag }}
        run: npm publish --access public --provenance --tag "$NPM_PUBLISH_TAG"

      - name: Verify latest was not moved
        if: steps.state.outputs.published == 'false'
        shell: bash
        env:
          VERSION: ${{ steps.ring.outputs.version }}
        run: |
          set -euo pipefail
          latest="$(npm view openrappter dist-tags.latest)"
          if [ "$latest" = "$VERSION" ]; then
            echo "FATAL: canary ${VERSION} became the latest dist-tag" >&2
            exit 1
          fi
          printf 'latest is still %s — unchanged\n' "$latest"
