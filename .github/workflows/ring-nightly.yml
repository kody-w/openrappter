name: Ring — nightly

# Nightly publishes one dated prerelease per day, but only when main actually
# moved. Publishing an identical rebuild every night would burn version numbers
# and make the train look busy while shipping nothing.

on:
  schedule:
    # 07:00 UTC daily.
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: openrappter-ring-nightly
  cancel-in-progress: false

jobs:
  gate:
    name: Verify before publishing
    uses: ./.github/workflows/ci.yml

  nightly:
    name: Publish nightly
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: typescript/package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Unit-test the ring logic
        run: node --test scripts/ring.test.mjs

      - name: Skip when main has not moved since the last nightly
        id: churn
        shell: bash
        run: |
          set -euo pipefail
          previous="$(npm view openrappter dist-tags.nightly 2>/dev/null || true)"
          if [ -z "$previous" ]; then
            printf 'proceed=true\n' >> "$GITHUB_OUTPUT"
            echo "no previous nightly; publishing the first one"
            exit 0
          fi
          # The nightly suffix is the date it was cut; a same-day rerun is a no-op.
          today="$(date -u +%Y%m%d)"
          case "$previous" in
            *".nightly.${today}")
              printf 'proceed=false\n' >> "$GITHUB_OUTPUT"
              printf 'nightly for %s already published (%s)\n' "$today" "$previous"
              ;;
            *)
              printf 'proceed=true\n' >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Resolve nightly version and dist-tag
        id: ring
        if: steps.churn.outputs.proceed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          version="$(node scripts/ring-cli.mjs version --ring nightly --date "$(date -u +%Y%m%d)")"
          tag="$(node scripts/ring-cli.mjs dist-tag --ring nightly)"
          if [ "$tag" = "latest" ]; then
            echo "refusing to publish nightly to the latest dist-tag" >&2
            exit 1
          fi
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"

      - name: Stamp the nightly version
        if: steps.churn.outputs.proceed == 'true'
        working-directory: typescript
        env:
          VERSION: ${{ steps.ring.outputs.version }}
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build
        if: steps.churn.outputs.proceed == 'true'
        working-directory: typescript
        run: |
          npm ci
          npm run build

      - name: Publish to the nightly dist-tag
        if: steps.churn.outputs.proceed == 'true'
        working-directory: typescript
        env:
          NPM_PUBLISH_TAG: ${{ steps.ring.outputs.tag }}
        run: npm publish --access public --provenance --tag "$NPM_PUBLISH_TAG"

      - name: Verify latest was not moved
        if: steps.churn.outputs.proceed == 'true'
        shell: bash
        env:
          VERSION: ${{ steps.ring.outputs.version }}
        run: |
          set -euo pipefail
          latest="$(npm view openrappter dist-tags.latest)"
          if [ "$latest" = "$VERSION" ]; then
            echo "FATAL: nightly ${VERSION} became the latest dist-tag" >&2
            exit 1
          fi
          printf 'latest is still %s — unchanged\n' "$latest"
