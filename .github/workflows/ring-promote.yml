name: Ring — promote

# Promotion moves a build one step along the train by re-pointing an npm
# dist-tag at an ALREADY PUBLISHED version. It never rebuilds and never
# republishes, mirroring the exact-commit promotion rule the rapp release
# train enforces: no phase rebuilds or replaces a candidate asset.
#
# `stable` is deliberately NOT reachable here. Shipping stable means publishing
# the real release version through release.yml, so `latest` can never end up
# pointing at a prerelease.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Published prerelease version to promote (e.g. 1.11.0-0.canary.a1b2c3d4)'
        required: true
        type: string
      from:
        description: 'Ring the version currently sits in'
        required: true
        type: choice
        options: [canary, nightly, alpha]
      to:
        description: 'Ring to promote into (must be the next ring)'
        required: true
        type: choice
        options: [nightly, alpha, beta]

permissions:
  contents: read

concurrency:
  group: openrappter-ring-promote
  cancel-in-progress: false

jobs:
  promote:
    name: ${{ inputs.from }} -> ${{ inputs.to }}
    runs-on: ubuntu-latest
    environment: ring-promotion
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Unit-test the ring logic
        run: node --test scripts/ring.test.mjs

      - name: Confirm the version is actually published
        id: published
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if ! npm view "openrappter@${VERSION}" version >/dev/null 2>&1; then
            echo "refusing to promote unpublished version ${VERSION}" >&2
            exit 1
          fi
          printf 'versions=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate the promotion
        id: plan
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
          FROM: ${{ inputs.from }}
          TO: ${{ inputs.to }}
          PUBLISHED: ${{ steps.published.outputs.versions }}
        run: |
          set -euo pipefail
          # Fail-closed: rejects ring skips, backwards moves, ring/version
          # mismatches, and any attempt to reach stable by dist-tag.
          plan="$(node scripts/ring-cli.mjs promote \
            --version "$VERSION" --from "$FROM" --to "$TO" --published "$PUBLISHED")"
          printf '%s\n' "$plan"
          tag="$(printf '%s' "$plan" | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>process.stdout.write(JSON.parse(s).distTag))')"
          if [ "$tag" = "latest" ]; then
            echo "refusing to move the latest dist-tag" >&2
            exit 1
          fi
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"

      - name: Re-point the dist-tag (no rebuild)
        env:
          VERSION: ${{ inputs.version }}
          TAG: ${{ steps.plan.outputs.tag }}
        run: npm dist-tag add "openrappter@${VERSION}" "$TAG"

      - name: Verify the move landed and latest is untouched
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
          TAG: ${{ steps.plan.outputs.tag }}
        run: |
          set -euo pipefail
          moved="$(npm view openrappter "dist-tags.${TAG}")"
          if [ "$moved" != "$VERSION" ]; then
            echo "dist-tag ${TAG} is ${moved}, expected ${VERSION}" >&2
            exit 1
          fi
          latest="$(npm view openrappter dist-tags.latest)"
          if [ "$latest" = "$VERSION" ]; then
            echo "FATAL: prerelease ${VERSION} became latest" >&2
            exit 1
          fi
          printf '%s now points at %s; latest still %s\n' "$TAG" "$VERSION" "$latest"
